<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="icon" href="./Images/Pixelated.png" type="image/png">
    <link rel="stylesheet" href="./CSS-Files/login.css">
    <script>
        if (localStorage.getItem("token")) {
            window.location.href = "dashboard.html";
        }
    </script>
</head>

<body>
    <div class="login-box">

        <div class="left">
            <h2>Welcome Back</h2>
            <p>Login to ShadowMap and enjoy your OSINT experience.</p>
        </div>

        <div class="right">
            <form id="loginForm">

                <input id="emailInput" type="email" placeholder="Email" required>
                <input id="passwordInput" type="password" placeholder="Password" required>

                <div class="options">
                    <label class="remember-me">
                        <input type="checkbox">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </div>

                <button type="submit">Login</button>

                <div class="signup-link">
                    Don't have an account? <a href="signup.html">Sign Up</a>
                </div>
            </form>
        </div>

    </div>
    <script src="./JS-Files/login.js"></script>
</body>

</html>
